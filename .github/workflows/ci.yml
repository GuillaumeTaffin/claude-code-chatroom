name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checks
        run: bun run check:types

      - name: Run unit tests
        run: bun run check:test:unit

      - name: Run unit coverage
        run: bun run check:coverage

      - name: Run lint checks
        run: bun run check:lint

      - name: Run format checks
        run: bun run check:format

  checks-broader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run component tests
        run: bun run check:test:component

      - name: Run integration tests
        run: bun run check:test:integration
